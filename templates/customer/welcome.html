<!DOCTYPE html>
<html>
<head>
    <title>Welcome | Smart Restaurant</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #0d0d0d;
        }

        /* ADMIN BUTTON */
        .admin-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 18px;
            border-radius: 25px;
            background: black;
            border: 2px solid gold;
            color: gold;
            text-decoration: none;
            font-weight: bold;
            z-index: 2;
            transition: 0.3s;
        }

        .admin-btn:hover {
            background: gold;
            color: black;
        }

        /* HERO SECTION */
        .hero {
            height: 100vh;

            /* 🔥 BACKGROUND IMAGE */
            background: url("{{ url_for('static', filename='uploads/restro.jpg') }}") no-repeat center center/cover;

            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* DARK OVERLAY */
        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
        }

        /* CONTENT */
        .hero-content {
            position: relative;
            text-align: center;
            color: gold;
            animation: fadeIn 1.5s ease-in-out;
        }

        .hero-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 60px;
            margin-bottom: 10px;
        }

        .hero-content p {
            font-size: 20px;
            margin-bottom: 30px;
            color: #ddd;
        }

        .main-btn {
            padding: 12px 30px;
            background: linear-gradient(45deg, #d4af37, #ffd700);
            color: black;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }

        .main-btn:hover {
            background: gold;
        }

        /* ANIMATION */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

</head>

<body>

<!-- ADMIN LOGIN -->
<a href="/admin/login" class="admin-btn">🔐 Admin Login</a>

<!-- HERO SECTION -->
<section class="hero">
    <div class="overlay"></div>

    <div class="hero-content">
        <h1>🍽 Smart Restaurant</h1>
        <p>Luxury Dining Experience at Your Table</p>

        <a href="/menu?table=1" class="main-btn">
            View Menu
        </a>
    </div>
</section>

</body>
</html>
