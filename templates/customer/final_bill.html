<!DOCTYPE html>
<html>
<head>
    <title>Final Bill</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0d0d0d;
            color: gold;
        }

        .container {
            max-width: 900px;
            margin: 60px auto;
            padding: 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
        }

        .order-info {
            text-align: center;
            color: #ccc;
            margin-bottom: 30px;
        }

        .item {
            display: flex;
            justify-content: space-between;
            background: #1a1a1a;
            padding: 15px 20px;
            margin-bottom: 10px;
            border-radius: 12px;
        }

        .item:hover {
            box-shadow: 0 0 15px rgba(255,215,0,0.4);
        }

        .total-box {
            margin-top: 30px;
            padding: 20px;
            text-align: center;
            background: #1a1a1a;
            border-radius: 15px;
        }

        .total-box h3 {
            color: #ccc;
        }

        .total-box h2 {
            margin-top: 10px;
        }

        .payment-box {
            text-align: center;
            margin-top: 30px;
        }

        select {
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        button {
            padding: 12px 30px;
            border-radius: 30px;
            background: linear-gradient(45deg, #d4af37, #ffd700);
            color: black;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: gold;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: gold;
            text-decoration: none;
            border: 2px solid gold;
            padding: 6px 15px;
            border-radius: 20px;
        }

        .back-btn:hover {
            background: gold;
            color: black;
        }
    </style>
</head>

<body>

<a href="/menu" class="back-btn">⬅ Back</a>

<div class="container">

    <h2>🧾 Final Bill</h2>

    <div class="order-info">
        Order ID: <strong>{{ order.id }}</strong> <br>
        Table No: <strong>{{ order.table_no }}</strong>
    </div>

    {% for item in items %}
    <div class="item">
        <div>
            <strong>{{ item.item_name }}</strong><br>
            Qty: {{ item.quantity }}
        </div>
        <div>
            ₹ {{ item.price * item.quantity }}
        </div>
    </div>
    {% endfor %}

    <div class="total-box">
        <h3>Total Amount</h3>
        <h2>₹ {{ order.total }}</h2>
    </div>

    <div class="payment-box">
        <form action="/payment" method="POST">
            <select name="payment_method">
                <option value="Cash">Cash</option>
                <option value="UPI">UPI</option>
                <option value="Card">Card</option>
            </select><br>

            <button type="submit">💳 Pay Now</button>
        </form>
    </div>

</div>

</body>
</html>
