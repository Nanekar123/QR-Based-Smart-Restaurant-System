<!DOCTYPE html>
<html>
<head>
    <title>Order Success | Smart Restaurant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Optional auto redirect after 5 seconds -->
    <meta http-equiv="refresh" content="5;url={{ url_for('order_status', order_id=order.order_id) }}">
</head>
<body class="order-success-page">

<div class="order-success-container">

    <div class="success-animation">
        🎉
    </div>

    <h1 class="success-heading">Order Placed Successfully!</h1>

    <div class="order-details-card">
        <p><strong>Order ID:</strong> {{ order.order_id }}</p>
        <p><strong>Table No:</strong> {{ order.table_no }}</p>
        <p><strong>Status:</strong> {{ order.status }}</p>
        <p class="total-paid"><strong>Total Paid:</strong> ₹ {{ order.total }}</p>
    </div>

    <h3 class="thank-you-text">Thank you for ordering 🍽</h3>

    <a href="{{ url_for('menu') }}" class="menu-btn">
        Back to Menu →
    </a>

</div>

</body>
</html>
