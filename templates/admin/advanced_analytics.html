<!DOCTYPE html>
<html>
<head>
<title>Advanced Analytics</title>

<style>
body {
    background: #0d0d0d;
    color: gold;
    font-family: 'Segoe UI';
    margin: 0;
}

/* HEADER */
.header {
    text-align: center;
    padding: 25px;
    font-size: 32px;
    font-weight: bold;
}

/* TOP BAR */
.top-bar {
    text-align: center;
    margin-bottom: 20px;
}

.btn {
    padding: 10px 22px;
    border-radius: 25px;
    border: none;
    background: linear-gradient(45deg, #d4af37, #ffd700);
    color: black;
    font-weight: bold;
    cursor: pointer;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    background: gold;
}

/* GRID LAYOUT */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
    gap: 30px;
    padding: 30px;
}

/* CARD */
.card {
    background: #1a1a1a;
    border-radius: 15px;
    padding: 20px;
    border: 1px solid gold;
    box-shadow: 0 0 12px rgba(255, 215, 0, 0.15);
}

/* TITLE */
.card h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* CHART BOX */
.chart-box {
    background: white;
    border-radius: 10px;
    padding: 15px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="header">🚀 Advanced Analytics</div>

<div class="top-bar">
    <a href="/admin/analytics" class="btn">⬅ Back to Analytics</a>
</div>

<div class="grid">

    <!-- 📈 TREND -->
    <div class="card">
        <h2>📈 Sales Trend (Day-wise)</h2>
        <div class="chart-box">
            <canvas id="trendChart"></canvas>
        </div>
    </div>

    <!-- 🥧 CATEGORY -->
    <div class="card">
        <h2>🥧 Category Distribution</h2>
        <div class="chart-box">
            <canvas id="categoryChart"></canvas>
        </div>
    </div>

    <!-- 🏆 TOP ITEMS -->
    <div class="card">
        <h2>🏆 Top 5 Selling Items</h2>
        <div class="chart-box">
            <canvas id="topChart"></canvas>
        </div>
    </div>

</div>

<script>

// 📈 TREND CHART
let t_labels = [];
let t_data = [];

{% for t in trend %}
t_labels.push("{{ t.date }}");
t_data.push({{ t.total_items }});
{% endfor %}

new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: {
        labels: t_labels,
        datasets: [{
            label: 'Items Sold',
            data: t_data,
            tension: 0.4
        }]
    }
});


// 🥧 CATEGORY CHART
let c_labels = [];
let c_data = [];

{% for c in category_data %}
c_labels.push("{{ c.category }}");
c_data.push({{ c.qty }});
{% endfor %}

new Chart(document.getElementById('categoryChart'), {
    type: 'pie',
    data: {
        labels: c_labels,
        datasets: [{
            data: c_data
        }]
    }
});


// 🏆 TOP ITEMS
let top_labels = [];
let top_data = [];

{% for t in top_items %}
top_labels.push("{{ t.item_name }}");
top_data.push({{ t.qty }});
{% endfor %}

new Chart(document.getElementById('topChart'), {
    type: 'bar',
    data: {
        labels: top_labels,
        datasets: [{
            label: 'Quantity Sold',
            data: top_data
        }]
    }
});

</script>

</body>
</html>
