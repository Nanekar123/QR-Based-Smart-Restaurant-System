<!DOCTYPE html>
<html>
<head>
<title>Smart Analytics</title>

<style>
body {
    background: #0b0b0b;
    color: gold;
    font-family: 'Segoe UI';
    margin: 0;
}

/* HEADER */
.header {
    text-align: center;
    padding: 25px 0 10px;
    font-size: 34px;
    font-weight: 600;
    letter-spacing: 1px;
}

/* TOP BAR */
.top-bar {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    margin: 15px 0;
}

/* BUTTON */
.btn {
    padding: 9px 20px;
    border-radius: 25px;
    border: none;
    background: linear-gradient(45deg, #c9a227, #ffd700);
    color: black;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: 0.25s;
}

.btn:hover {
    background: #ffd700;
}

/* FILTER */
.filter-box {
    text-align: center;
    margin: 20px 0 10px;
}

.filter-box input {
    padding: 7px 10px;
    border-radius: 8px;
    border: none;
    margin: 4px;
}

/* CARDS */
.analytics {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 30px auto;
    flex-wrap: wrap;
}

.card {
    background: #1a1a1a;
    padding: 20px;
    border-radius: 12px;
    width: 200px;
    text-align: center;
    border: 1px solid rgba(255,215,0,0.4);
    box-shadow: 0 0 10px rgba(255,215,0,0.15);
}

.card h3 {
    margin-bottom: 8px;
    font-size: 17px;
}

.card p {
    font-size: 20px;
    font-weight: bold;
}

/* SECTION */
.section {
    width: 85%;
    margin: 50px auto;
}

.section h2 {
    margin-bottom: 15px;
    font-weight: 500;
}

/* CHART BOX */
.chart-box {
    background: #ffffff;
    border-radius: 12px;
    padding: 20px;
    border: 3px solid gold;
}

/* DIVIDER */
.divider {
    width: 70%;
    height: 1px;
    background: rgba(255,215,0,0.2);
    margin: 30px auto;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="header">📊 Smart Analytics</div>

<!-- NAV BUTTONS -->
<div class="top-bar">
    <a href="/admin/dashboard" class="btn">⬅ Back</a>
    <a href="/admin/analytics?filter=today" class="btn">Today</a>
    <a href="/admin/analytics/advanced" class="btn">Advanced</a>
</div>

<!-- DATE FILTER -->
<div class="filter-box">
<form method="GET" action="/admin/analytics">
    <input type="hidden" name="filter" value="custom">
    <input type="date" name="start" required>
    <input type="date" name="end" required>
    <button class="btn">Apply</button>
</form>
</div>

<!-- STATS -->
<div class="analytics">
    <div class="card">
        <h3>Total Orders</h3>
        <p>{{ total_orders }}</p>
    </div>

    <div class="card">
        <h3>Total Revenue</h3>
        <p>₹ {{ total_revenue }}</p>
    </div>
</div>

<div class="divider"></div>

<!-- FILTERED CHART -->
<div class="section">
    <h2>📅 Sales (Selected Range / Today)</h2>
    <div class="chart-box">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<!-- OVERALL CHART -->
<div class="section">
    <h2>📊 Overall Sales</h2>
    <div class="chart-box">
        <canvas id="overallChart"></canvas>
    </div>
</div>

<script>

// FILTERED CHART
let labels = [];
let data = [];

{% for item in filtered_items %}
labels.push("{{ item.item_name }}");
data.push({{ item.qty }});
{% endfor %}

new Chart(document.getElementById('mainChart'), {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [{
            label: 'Items Sold',
            data: data
        }]
    }
});


// OVERALL CHART
let o_labels = [];
let o_data = [];

{% for item in overall_items %}
o_labels.push("{{ item.item_name }}");
o_data.push({{ item.qty }});
{% endfor %}

new Chart(document.getElementById('overallChart'), {
    type: 'bar',
    data: {
        labels: o_labels,
        datasets: [{
            label: 'Overall Items',
            data: o_data
        }]
    }
});

</script>

</body>
</html>
