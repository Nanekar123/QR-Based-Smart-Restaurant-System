<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: gold;
        }

        .login-container {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 20px;
            width: 350px;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.3);
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 25px;
            border: none;
            background: #333;
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 25px;
            border: none;
            background: gold;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: black;
            border: 2px solid gold;
            padding: 8px 18px;
            border-radius: 25px;
            color: gold;
            cursor: pointer;
        }
    </style>

</head>

<body>

<button onclick="history.back()" class="back-btn">⬅ Back</button>

<div class="login-container">

    <h2>🔐 Admin Login</h2>

    <!-- FIXED HERE -->
    <form method="POST" action="{{ url_for('send_otp') }}">
        <input type="email" name="email" placeholder="Enter Email" required>
        <button type="submit">Send OTP</button>
    </form>

</div>

</body>
</html>
