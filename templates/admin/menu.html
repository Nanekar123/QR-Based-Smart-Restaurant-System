<!DOCTYPE html>
<html>
<head>
    <title>Menu Management</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0d0d0d;
            color: gold;
        }

        h1 {
            text-align: center;
            padding: 20px;
            font-size: 36px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
        }

        .btn {
            background: linear-gradient(45deg, #d4af37, #ffd700);
            border: none;
            padding: 10px 18px;
            border-radius: 25px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }

        .btn:hover {
            background: gold;
        }

        .back-btn {
            background: black;
            border: 2px solid gold;
            color: gold;
        }

        .back-btn:hover {
            background: gold;
            color: black;
        }

        table {
            width: 95%;
            margin: 20px auto;
            border-collapse: collapse;
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        th {
            background: gold;
            color: black;
        }

        tr:nth-child(even) {
            background: #222;
        }

        tr:hover {
            background: #333;
        }

        .edit-btn {
            color: #00ffcc;
            text-decoration: none;
            font-weight: bold;
        }

        .delete-btn {
            color: #ff4d4d;
            text-decoration: none;
            font-weight: bold;
        }

        .edit-btn:hover {
            text-decoration: underline;
        }

        .delete-btn:hover {
            text-decoration: underline;
        }

        .no-data {
            text-align: center;
            margin-top: 30px;
            color: #ccc;
        }
    </style>

</head>

<body>

<h1>🍽 Menu Management</h1>

<div class="top-bar">
    <a href="/admin/dashboard" class="btn back-btn">⬅ Back</a>
    <a href="/admin/add" class="btn">➕ Add New Item</a>
</div>

<hr>

{% if menu_items %}
<table>
<tr>
<th>Name</th>
<th>Price</th>
<th>Category</th>
<th>Sub Category</th>
<th>Action</th>
</tr>

{% for item in menu_items %}
<tr>
<td>{{ item.name }}</td>
<td>₹ {{ item.price }}</td>
<td>{{ item.category }}</td>
<td>{{ item.sub_category or '-' }}</td>
<td>
<a href="/admin/edit/{{ item.id }}" class="edit-btn">Edit</a> |
<a href="/admin/delete/{{ item.id }}" class="delete-btn"
   onclick="return confirm('Are you sure you want to delete this item?')">
   Delete
</a>
</td>
</tr>
{% endfor %}
</table>
{% else %}
<p class="no-data">No menu items found</p>
{% endif %}

</body>
</html>
