<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: gold;
        }

        .container {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 20px;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.3);
        }

        h2 {
            margin-bottom: 25px;
            font-size: 26px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 25px;
            border: none;
            outline: none;
            background: #333;
            color: #fff;
            font-size: 14px;
            text-align: center;
            letter-spacing: 3px;
        }

        input::placeholder {
            color: #aaa;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(45deg, #d4af37, #ffd700);
            color: black;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: gold;
            transform: scale(1.05);
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: black;
            border: 2px solid gold;
            padding: 8px 18px;
            border-radius: 25px;
            color: gold;
            text-decoration: none;
            font-weight: bold;
        }

        .back-btn:hover {
            background: gold;
            color: black;
        }
    </style>

</head>

<body>

<a href="/admin/login" class="back-btn">⬅ Back</a>

<div class="container">

    <h2>🔐 Enter OTP</h2>

    <form method="POST" action="/admin/verify_otp">
        <input name="otp" placeholder="Enter OTP" required>
        <button type="submit">Verify OTP</button>
    </form>

</div>

</body>
</html>
